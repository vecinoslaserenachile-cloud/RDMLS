<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9E1B1B" />
      <stop offset="100%" stop-color="#5a0b0b" />
    </linearGradient>
    <linearGradient id="shieldbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Red Rounded Square Background -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="url(#bg)" filter="url(#shadow)" stroke="#4a0000" stroke-width="2" />
  
  <!-- Inner Rim -->
  <rect x="7" y="7" width="86" height="86" rx="13" fill="none" stroke="#d64040" stroke-width="1.5" opacity="0.8" />

  <!-- Shield -->
  <path d="M50 15 L22 23 V48 C22 68 40 80 50 85 C60 80 78 68 78 48 V23 Z" fill="url(#shieldbg)" filter="url(#shadow)" />
  <path d="M50 17 L24 24.5 V48 C24 66 41 77 50 82 C59 77 76 66 76 48 V24.5 Z" fill="none" stroke="#f0f0f0" stroke-width="1.5" />

  <!-- City Skyline Sillhouettes Left -->
  <path d="M22 65 H28 V56 L30 53 L32 56 V65 H35 V48 L37 46 L39 48 V65 H41 V69 H22 Z" fill="#d1d5db" />
  
  <!-- City Skyline Sillhouettes Right -->
  <path d="M78 65 H72 V58 H68 V53 H64 V65 H60 V60 H59 V69 H78 Z" fill="#d1d5db" />

  <!-- Lighthouse -->
  <path d="M42 66 L44 42 H56 L58 66 Z" fill="#f8fafc" />
  <path d="M42 66 L44 42 H46 L44 66 Z" fill="#cbd5e1" />
  <rect x="40" y="66" width="20" height="3" fill="#991b1b" />
  
  <rect x="45" y="38" width="10" height="4" fill="#991b1b" />
  <!-- Lantern Room -->
  <path d="M43 38 L57 38 L56 32 H44 Z" fill="#fca5a5" fill-opacity="0.8" />
  <rect x="44" y="31" width="12" height="2" fill="#991b1b" />
  
  <!-- Dome -->
  <path d="M45 31 L50 25 L55 31 Z" fill="#991b1b" />
  <circle cx="50" cy="25" r="1.5" fill="#f8fafc" />
  
  <!-- Light Glow -->
  <circle cx="50" cy="35" r="4" fill="#fef08a" filter="url(#glow)" />

  <!-- Windows -->
  <rect x="49" y="46" width="2" height="4" fill="#64748b" />
  <rect x="49" y="54" width="2" height="4" fill="#64748b" />

  <!-- Text -->
  <text x="50" y="91" font-family="Arial, sans-serif" font-weight="900" font-size="12" letter-spacing="0.5" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">SMART LS</text>
</svg>
